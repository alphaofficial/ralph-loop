name: Release

# CalVer release workflow.
#
# Tags are formatted as YYYY.MM.DD, with a `.N` suffix for additional releases
# on the same day (e.g. 2026.04.12, 2026.04.12.1, 2026.04.12.2).
#
# Manual only: trigger from the Actions tab when you're ready to cut a release.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute CalVer tag
        id: tag
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y.%m.%d)"
          git fetch --tags --quiet
          existing=$(git tag --list "${DATE}" "${DATE}.*" | sort -V)
          if [ -z "$existing" ]; then
            TAG="$DATE"
          else
            n=1
            while echo "$existing" | grep -qx "${DATE}.${n}"; do
              n=$((n + 1))
            done
            TAG="${DATE}.${n}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Create tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.tag }}" -m "Release ${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

  build:
    needs: tag
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: ralph-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: ralph-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: ralph-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            artifact: ralph-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun test

      # BUN_NO_CODESIGN_MACHO_BINARY works around oven-sh/bun#29120
      # (truncated code signature in Bun 1.3.12+). We sign manually after.
      - name: Compile binary
        run: bun build --compile --define 'RALPH_VERSION="${{ needs.tag.outputs.tag }}"' --target=${{ matrix.target }} src/cli.ts --outfile ${{ matrix.artifact }}
        env:
          BUN_NO_CODESIGN_MACHO_BINARY: "1"

      - name: Codesign macOS binary
        if: startsWith(matrix.os, 'macos')
        run: codesign --deep --force --sign - --entitlements entitlements.plist ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${{ needs.tag.outputs.tag }}^" 2>/dev/null || true)"
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="$PREVIOUS_TAG..${{ needs.tag.outputs.tag }}"
          else
            RANGE="${{ needs.tag.outputs.tag }}"
          fi

          types=(feat fix docs refactor test ci build perf style chore)

          section_title() {
            case "$1" in
              feat) echo "Features" ;;
              fix) echo "Fixes" ;;
              docs) echo "Documentation" ;;
              refactor) echo "Refactoring" ;;
              test) echo "Tests" ;;
              ci) echo "CI" ;;
              build) echo "Build" ;;
              perf) echo "Performance" ;;
              style) echo "Style" ;;
              chore) echo "Chores" ;;
            esac
          }

          notes_dir="$(mktemp -d)"
          trap 'rm -rf "$notes_dir"' EXIT
          breaking_file="$notes_dir/breaking.md"
          other_file="$notes_dir/other.md"
          touch "$breaking_file" "$other_file"
          for type in "${types[@]}"; do
            touch "$notes_dir/$type.md"
          done

          breaking_re='^(feat|fix|docs|refactor|test|ci|build|perf|style|chore)(\([^)]*\))?!:[[:space:]]+(.+)$'
          normal_re='^(feat|fix|docs|refactor|test|ci|build|perf|style|chore)(\([^)]*\))?:[[:space:]]+(.+)$'

          while IFS= read -r subject || [ -n "$subject" ]; do
            if [[ "$subject" =~ $breaking_re ]]; then
              type="${BASH_REMATCH[1]}"
              scope="${BASH_REMATCH[2]}"
              description="${BASH_REMATCH[3]}"
              printf -- '- %s%s!: %s\n' "$type" "$scope" "$description" >> "$breaking_file"
            elif [[ "$subject" =~ $normal_re ]]; then
              type="${BASH_REMATCH[1]}"
              scope="${BASH_REMATCH[2]}"
              description="${BASH_REMATCH[3]}"
              printf -- '- %s%s: %s\n' "$type" "$scope" "$description" >> "$notes_dir/$type.md"
            else
              printf -- '- %s\n' "$subject" >> "$other_file"
            fi
          done < <(git log --pretty=format:'%s' "$RANGE")

          {
            echo "## Changelog"
            echo
            if [ -s "$breaking_file" ]; then
              echo "### Breaking Changes"
              cat "$breaking_file"
              echo
            fi
            for type in "${types[@]}"; do
              file="$notes_dir/$type.md"
              if [ -s "$file" ]; then
                echo "### $(section_title "$type")"
                cat "$file"
                echo
              fi
            done
            if [ -s "$other_file" ]; then
              echo "### Other Changes"
              cat "$other_file"
              echo
            fi
          } > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.tag.outputs.tag }}" \
            --title "${{ needs.tag.outputs.tag }}" \
            --notes-file release-notes.md \
            --latest \
            artifacts/*

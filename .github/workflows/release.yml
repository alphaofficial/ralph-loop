name: Release

# CalVer release workflow.
#
# Tags are formatted as YYYY.MM.DD, with a `.N` suffix for additional releases
# on the same day (e.g. 2026.04.12, 2026.04.12.1, 2026.04.12.2).
#
# Manual only: trigger from the Actions tab when you're ready to cut a release.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute CalVer tag
        id: tag
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y.%m.%d)"
          git fetch --tags --quiet
          existing=$(git tag --list "${DATE}" "${DATE}.*" | sort -V)
          if [ -z "$existing" ]; then
            TAG="$DATE"
          else
            n=1
            while echo "$existing" | grep -qx "${DATE}.${n}"; do
              n=$((n + 1))
            done
            TAG="${DATE}.${n}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Create tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.tag.outputs.tag }}" -m "Release ${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

  build:
    needs: tag
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: ralph-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: ralph-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: ralph-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            artifact: ralph-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.22"

      - run: bun install

      - run: bun test

      - run: bun build --compile --target=${{ matrix.target }} src/cli.ts --outfile ${{ matrix.artifact }}

      - name: Codesign macOS binary
        if: startsWith(matrix.os, 'macos')
        run: codesign --deep --force --sign - --entitlements entitlements.plist ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.tag.outputs.tag }}" \
            --title "${{ needs.tag.outputs.tag }}" \
            --generate-notes \
            --latest \
            artifacts/*
